{% extends 'core/base.html' %}

{% block title %} Home {% endblock %}

{% block body %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md bg-forest-900 border border-forest-700/40 rounded-2xl p-8 shadow-[0_0_30px_rgba(181,255,77,0.07)]">

    <h1 class="font-display text-4xl tracking-wide text-forest-50 mb-8">Szukaj ligi</h1>

    <form method="POST" class="flex flex-col gap-5">
      {% csrf_token %}

      <!-- Sezon -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium tracking-widest uppercase text-forest-300">Sezon</label>
        <select name="season"
                class="bg-forest-800 border border-forest-700/50 rounded-lg px-4 py-3 text-forest-50 text-sm focus:outline-none focus:border-[#b5ff4d] focus:shadow-[0_0_12px_rgba(181,255,77,0.15)] transition-all duration-200 appearance-none cursor-pointer">
          {% for value, label in form.season.field.choices %}
            <option value="{{ value }}" class="bg-forest-800">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Województwo -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium tracking-widest uppercase text-forest-300">Województwo</label>
        <select name="province"
                class="bg-forest-800 border border-forest-700/50 rounded-lg px-4 py-3 text-forest-50 text-sm focus:outline-none focus:border-[#b5ff4d] focus:shadow-[0_0_12px_rgba(181,255,77,0.15)] transition-all duration-200 appearance-none cursor-pointer">
          {% for value, label in form.province.field.choices %}
            <option value="{{ value }}" class="bg-forest-800">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Klasa rozgrywkowa -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium tracking-widest uppercase text-forest-300">Klasa rozgrywkowa</label>
        <select name="competition_class"
                class="bg-forest-800 border border-forest-700/50 rounded-lg px-4 py-3 text-forest-50 text-sm focus:outline-none focus:border-[#b5ff4d] focus:shadow-[0_0_12px_rgba(181,255,77,0.15)] transition-all duration-200 appearance-none cursor-pointer">
          {% for value, label in form.competition_class.field.choices %}
            <option value="{{ value }}" class="bg-forest-800">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Grupa -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-medium tracking-widest uppercase text-forest-300">Grupa</label>
        <input type="text" name="group" placeholder="np. Grupa I"
               class="bg-forest-800 border border-forest-700/50 rounded-lg px-4 py-3 text-forest-50 placeholder-forest-500 text-sm focus:outline-none focus:border-[#b5ff4d] focus:shadow-[0_0_12px_rgba(181,255,77,0.15)] transition-all duration-200">
      </div>

      <button type="submit"
              class="mt-2 px-4 py-3 rounded-lg text-xs font-semibold tracking-widest uppercase bg-[#b5ff4d] text-forest-950 hover:bg-[#caff7a] hover:shadow-[0_0_16px_rgba(181,255,77,0.4)] transition-all duration-200">
        Szukaj
      </button>

    </form>
  </div>
</div>
{% endblock %}
