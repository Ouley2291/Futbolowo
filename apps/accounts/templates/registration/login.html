{% extends 'core/base.html' %}

{% block title %}Login{% endblock %}

{% block body %}
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-8">
            <h1 class="text-2xl text-white font-bold mb-6">Logowanie</h1>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                {% for field in form %}
                <div>
                    <label class="block text-sm text-gray-400 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-xs mt-1">{{ field.errors|join:", " }}</p>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-2.5 rounded-xl text-sm text-white font-medium mt-2"> Zaloguj się </button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-6"> Nie posiadasz konta? <a href="{% url 'accounts:register' %}" class="text-blue-400 hover:text-blue-300">Zarejestruj się</a> </p>
        </div>
    </div>
{% endblock %}
